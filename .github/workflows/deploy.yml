name: Deploy to VPS

on:
  push:
    branches:
      - main  # Ganti kalau branch utama kamu bukan "main"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build Svelte app → output ke folder dist/
      - name: Build app
        run: npm run build

      # 5. Copy hasil build ke VPS via SCP
      - name: Deploy ke VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "dist/"
          target: "/root/kerjaan/portofolio-irka/dist"
          strip_components: 1              # Supaya isi dist/ langsung masuk ke target, bukan dist/dist/
